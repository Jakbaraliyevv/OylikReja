<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>📚 Shaxsiy Lug'at</title>
    <style>
      /* ===== ROOT ===== */
      :root {
        --bg: #eef0f3;
        --bg-card: #ffffff;
        --bg-input: #f5f6f8;
        --text: #1a1a2e;
        --text-secondary: #6b7280;
        --border: #e2e4e8;
        --shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
        --primary: #28313f;
        --primary-light: #3d4a5c;
        --primary-glow: rgba(40, 49, 63, 0.15);
        --blue: #4f7df3;
        --blue-light: #e8eeff;
        --red: #ef4444;
        --red-light: #fee2e2;
        --green: #10b981;
        --green-light: #d1fae5;
        --gold: #f59e0b;
        --gold-light: #fef3c7;
        --radius: 16px;
        --radius-sm: 10px;
        --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      [data-theme="dark"] {
        --bg: #0f1117;
        --bg-card: #1a1d27;
        --bg-input: #252a36;
        --text: #e8eaed;
        --text-secondary: #9aa0b0;
        --border: #2d3342;
        --shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        --primary-glow: rgba(40, 49, 63, 0.4);
        --blue-light: #1a2744;
        --green-light: #0a2a20;
        --red-light: #3d1515;
        --gold-light: #3d2e0a;
      }

      /* ===== RESET ===== */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        padding: 14px;
        transition: var(--transition);
        min-height: 100vh;
      }
      .wrap {
        max-width: 1100px;
        margin: 0 auto;
      }

      /* ===== SCROLL ===== */
      ::-webkit-scrollbar {
        width: 5px;
        height: 5px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--primary);
        border-radius: 10px;
      }

      /* ===== HEADER ===== */
      .header {
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-light)
        );
        padding: 18px 24px;
        border-radius: var(--radius);
        margin-bottom: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 12px;
        box-shadow: 0 8px 32px rgba(40, 49, 63, 0.3);
      }
      .header h1 {
        color: #fff;
        font-size: 22px;
        font-weight: 800;
        display: flex;
        align-items: center;
        gap: 10px;
        letter-spacing: -0.5px;
      }
      .header h1 small {
        font-size: 13px;
        font-weight: 400;
        opacity: 0.7;
        letter-spacing: 0;
      }
      .header-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .theme-btn {
        background: rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.15);
        color: #fff;
        padding: 9px 18px;
        border-radius: var(--radius-sm);
        cursor: pointer;
        font-size: 13px;
        font-weight: 500;
        transition: var(--transition);
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .theme-btn:hover {
        background: rgba(255, 255, 255, 0.22);
        transform: scale(1.02);
      }

      /* ===== STATS ===== */
      .stats {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
        margin-bottom: 20px;
      }
      .stat {
        background: var(--bg-card);
        padding: 16px 18px;
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        border: 1px solid var(--border);
        transition: var(--transition);
        position: relative;
        overflow: hidden;
      }
      .stat::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
      }
      .stat:nth-child(1)::before {
        background: var(--primary);
      }
      .stat:nth-child(2)::before {
        background: var(--blue);
      }
      .stat:nth-child(3)::before {
        background: var(--red);
      }
      .stat:nth-child(4)::before {
        background: var(--green);
      }
      .stat:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
      }
      .stat-num {
        font-size: 28px;
        font-weight: 800;
        letter-spacing: -0.5px;
        color: var(--text);
      }
      .stat-label {
        font-size: 12px;
        color: var(--text-secondary);
        margin-top: 3px;
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .stat .icon {
        font-size: 16px;
      }
      .num-primary {
        color: var(--primary);
      }
      .num-blue {
        color: var(--blue);
      }
      .num-red {
        color: var(--red);
      }
      .num-green {
        color: var(--green);
      }

      /* ===== DAILY ===== */
      .daily-box {
        background: var(--bg-card);
        padding: 18px 22px;
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        margin-bottom: 18px;
        border: 1px solid var(--border);
        transition: var(--transition);
      }
      .daily-box:hover {
        border-color: var(--primary);
      }
      .daily-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 12px;
      }
      .daily-head h3 {
        font-size: 14px;
        color: var(--text-secondary);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .daily-head h3 strong {
        color: var(--text);
      }
      .daily-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }
      .daily-row input {
        width: 90px;
        padding: 10px 14px;
        border: 2px solid var(--border);
        border-radius: var(--radius-sm);
        font-size: 15px;
        font-weight: 600;
        background: var(--bg-input);
        color: var(--text);
        outline: none;
        transition: var(--transition);
        text-align: center;
      }
      .daily-row input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px var(--primary-glow);
      }
      .daily-row .info {
        color: var(--text-secondary);
        font-size: 13px;
      }
      .daily-words {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 12px;
        padding-top: 12px;
        border-top: 2px dashed var(--border);
        min-height: 36px;
      }
      .daily-tag {
        background: var(--bg-input);
        padding: 5px 14px;
        border-radius: 20px;
        font-size: 12px;
        border: 1px solid var(--border);
        color: var(--text);
        transition: var(--transition);
      }
      .daily-tag.done {
        background: var(--green-light);
        border-color: var(--green);
        color: var(--green);
      }
      .daily-empty {
        color: var(--text-secondary);
        font-size: 13px;
        font-style: italic;
      }

      /* ===== ADD ===== */
      .add-box {
        background: var(--bg-card);
        padding: 20px 24px;
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        margin-bottom: 18px;
        border: 1px solid var(--border);
        transition: var(--transition);
      }
      .add-box:hover {
        border-color: var(--primary);
      }
      .add-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 14px;
      }
      .add-head h3 {
        font-size: 15px;
        color: var(--text-secondary);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .edit-badge {
        background: var(--gold);
        color: #fff;
        padding: 3px 12px;
        border-radius: 20px;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .add-grid {
        display: grid;
        grid-template-columns: 1fr 1fr 0.7fr auto auto auto;
        gap: 10px;
        align-items: center;
      }
      .add-grid input,
      .add-grid select {
        width: 100%;
        padding: 10px 14px;
        border: 2px solid var(--border);
        border-radius: var(--radius-sm);
        font-size: 14px;
        background: var(--bg-input);
        color: var(--text);
        outline: none;
        transition: var(--transition);
      }
      .add-grid input:focus,
      .add-grid select:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px var(--primary-glow);
      }
      .add-grid .trans-box {
        width: 100%;
        padding: 10px 14px;
        background: var(--bg-input);
        border-radius: var(--radius-sm);
        font-size: 14px;
        color: var(--text);
        border: 2px dashed var(--border);
        min-height: 42px;
        display: flex;
        align-items: center;
        transition: var(--transition);
      }
      .add-grid .trans-box.loading {
        color: var(--text-secondary);
        font-style: italic;
      }
      .add-grid .trans-box.error {
        color: var(--red);
        border-color: var(--red);
      }
      .add-grid .trans-box.success {
        border-color: var(--green);
      }
      .btn {
        padding: 10px 20px;
        border: none;
        border-radius: var(--radius-sm);
        font-weight: 600;
        font-size: 13px;
        cursor: pointer;
        transition: var(--transition);
        display: inline-flex;
        align-items: center;
        gap: 6px;
        white-space: nowrap;
      }
      .btn:active {
        transform: scale(0.95);
      }
      .btn-save {
        background: var(--primary);
        color: #fff;
      }
      .btn-save:hover {
        background: var(--primary-light);
        box-shadow: 0 4px 15px var(--primary-glow);
      }
      .btn-trans {
        background: var(--bg-input);
        color: var(--text);
        border: 2px solid var(--border);
      }
      .btn-trans:hover {
        background: var(--border);
      }
      .btn-danger {
        background: var(--red);
        color: #fff;
      }
      .btn-danger:hover {
        background: #dc2626;
        box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
      }
      .btn-edit {
        background: var(--gold);
        color: #fff;
      }
      .btn-edit:hover {
        background: #d97706;
        box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);
      }
      .btn-outline {
        background: transparent;
        border: 2px solid var(--border);
        color: var(--text);
      }
      .btn-outline:hover {
        background: var(--bg-input);
      }

      /* ===== SEARCH ===== */
      .search-box {
        display: grid;
        grid-template-columns: 2fr 1fr 1fr;
        gap: 10px;
        margin-bottom: 16px;
      }
      .search-box input,
      .search-box select {
        padding: 10px 14px;
        border: 2px solid var(--border);
        border-radius: var(--radius-sm);
        font-size: 13px;
        background: var(--bg-input);
        color: var(--text);
        outline: none;
        transition: var(--transition);
      }
      .search-box input:focus,
      .search-box select:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px var(--primary-glow);
      }

      /* ===== TABLE ===== */
      .tbl-wrap {
        background: var(--bg-card);
        border-radius: var(--radius);
        overflow: hidden;
        box-shadow: var(--shadow);
        border: 1px solid var(--border);
      }
      .tbl-scroll {
        overflow-x: auto;
        padding-bottom: 4px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
        min-width: 600px;
      }
      th {
        background: var(--primary);
        color: #fff;
        padding: 13px 16px;
        text-align: left;
        font-weight: 600;
        font-size: 12px;
        letter-spacing: 0.3px;
        white-space: nowrap;
        position: sticky;
        top: 0;
      }
      td {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        vertical-align: middle;
        color: var(--text);
      }
      tr:last-child td {
        border-bottom: none;
      }
      tr:hover td {
        background: var(--bg-input);
      }
      .word-uz {
        font-weight: 700;
        color: var(--text);
      }
      .word-kor {
        color: var(--text-secondary);
        font-weight: 500;
      }
      .status-badge {
        display: inline-block;
        padding: 4px 14px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 600;
      }
      .status-done {
        background: var(--green-light);
        color: var(--green);
      }
      .status-undone {
        background: var(--bg-input);
        color: var(--text-secondary);
      }
      .cat-badge {
        display: inline-block;
        padding: 3px 12px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 500;
        background: var(--bg-input);
        color: var(--text-secondary);
        border: 1px solid var(--border);
      }
      .actions {
        display: flex;
        gap: 5px;
        flex-wrap: wrap;
      }
      .actions button {
        padding: 5px 12px;
        border: none;
        border-radius: 8px;
        font-size: 12px;
        cursor: pointer;
        font-weight: 500;
        transition: var(--transition);
      }
      .actions button:active {
        transform: scale(0.92);
      }
      .btn-check {
        background: var(--green-light);
        color: var(--green);
      }
      .btn-check:hover {
        background: #a7f3d0;
      }
      .btn-check.done {
        background: var(--bg-input);
        color: var(--text-secondary);
      }
      .btn-check.done:hover {
        background: var(--border);
      }
      .empty {
        text-align: center;
        padding: 50px 20px;
        color: var(--text-secondary);
        font-size: 14px;
      }
      .empty .big {
        font-size: 56px;
        display: block;
        margin-bottom: 12px;
      }

      /* ===== PAGINATION ===== */
      .pagination {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 14px 18px;
        font-size: 13px;
        color: var(--text-secondary);
        border-top: 1px solid var(--border);
        flex-wrap: wrap;
        gap: 8px;
      }
      .pagination button {
        padding: 7px 18px;
        border: 2px solid var(--border);
        border-radius: var(--radius-sm);
        background: var(--bg-card);
        color: var(--text);
        cursor: pointer;
        font-size: 12px;
        font-weight: 500;
        transition: var(--transition);
      }
      .pagination button:hover:not(:disabled) {
        background: var(--bg-input);
        border-color: var(--primary);
      }
      .pagination button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      /* ===== RESPONSIVE ===== */
      @media (max-width: 992px) {
        .add-grid {
          grid-template-columns: 1fr 1fr 0.8fr;
        }
        .add-grid .btn {
          width: 100%;
          justify-content: center;
        }
        .add-grid .btn-trans,
        .add-grid .btn-danger {
          grid-column: span 1;
        }
      }
      @media (max-width: 768px) {
        body {
          padding: 10px;
        }
        .stats {
          grid-template-columns: repeat(2, 1fr);
          gap: 8px;
        }
        .stat {
          padding: 12px 14px;
        }
        .stat-num {
          font-size: 22px;
        }
        .add-grid {
          grid-template-columns: 1fr;
        }
        .add-grid .btn {
          width: 100%;
          justify-content: center;
        }
        .search-box {
          grid-template-columns: 1fr;
        }
        .header h1 {
          font-size: 18px;
        }
        .header h1 small {
          display: none;
        }
        .daily-row {
          flex-direction: column;
          align-items: stretch;
        }
        .daily-row input {
          width: 100%;
        }
        .daily-row .btn {
          width: 100%;
          justify-content: center;
        }
        .pagination {
          flex-direction: column;
          align-items: center;
        }
      }
      @media (max-width: 480px) {
        body {
          padding: 6px;
        }
        .stat-num {
          font-size: 18px;
        }
        .stat-label {
          font-size: 10px;
        }
        .header {
          padding: 12px 16px;
        }
        .header h1 {
          font-size: 16px;
        }
        .theme-btn {
          font-size: 12px;
          padding: 7px 14px;
        }
        .add-box,
        .daily-box {
          padding: 14px 16px;
        }
        .tbl-wrap {
          border-radius: 12px;
        }
        td,
        th {
          padding: 8px 10px;
          font-size: 12px;
        }
        .actions button {
          font-size: 11px;
          padding: 4px 8px;
        }
        .btn {
          padding: 8px 16px;
          font-size: 12px;
        }
        .daily-head h3 {
          font-size: 12px;
        }
        .add-head h3 {
          font-size: 13px;
        }
      }
      @media (max-width: 320px) {
        body {
          padding: 4px;
        }
        .stats {
          gap: 5px;
        }
        .stat {
          padding: 8px 10px;
        }
        .stat-num {
          font-size: 16px;
        }
        .stat-label {
          font-size: 9px;
        }
        .header h1 {
          font-size: 14px;
        }
        td,
        th {
          padding: 6px 8px;
          font-size: 11px;
        }
        table {
          min-width: 400px;
        }
      }

      /* ===== ANIMATIONS ===== */
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .stat,
      .daily-box,
      .add-box,
      .tbl-wrap {
        animation: fadeIn 0.4s ease-out;
      }
      tr {
        transition: var(--transition);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <!-- HEADER -->
      <div class="header">
        <h1>📚 Lug'at <small>shaxsiy</small></h1>
        <div class="header-actions">
          <button class="theme-btn" onclick="toggleTheme()">🌓 Rejim</button>
          <a href="./index.html">
            <button class="theme-btn">Home</button>
          </a>
        </div>
      </div>

      <!-- STATS -->
      <div class="stats">
        <div class="stat">
          <div class="stat-num num-primary" id="total-count">0</div>
          <div class="stat-label"><span class="icon">📖</span> Jami so'z</div>
        </div>
        <div class="stat">
          <div class="stat-num num-blue" id="learned-count">0</div>
          <div class="stat-label"><span class="icon">✅</span> O'rganilgan</div>
        </div>
        <div class="stat">
          <div class="stat-num num-red" id="remain-count">0</div>
          <div class="stat-label"><span class="icon">⏳</span> Qolgan</div>
        </div>
        <div class="stat">
          <div class="stat-num num-green" id="daily-count">0</div>
          <div class="stat-label">
            <span class="icon">📅</span> Bugungi yodlagan
          </div>
        </div>
      </div>

      <!-- DAILY -->
      <div class="daily-box">
        <div class="daily-head">
          <h3>
            📅 <strong id="daily-date-label">Bugun</strong> yodlagan so'zlar
          </h3>
          <button
            class="btn btn-danger"
            onclick="clearDaily()"
            style="padding: 6px 16px; font-size: 12px"
          >
            🗑️ Tozalash
          </button>
        </div>
        <div class="daily-row">
          <input
            type="number"
            id="daily-input"
            min="1"
            max="200"
            placeholder="70"
          />
          <span class="info">ta so'z yodladim</span>
          <button class="btn btn-save" onclick="addDaily()">➕ Kiritish</button>
        </div>
        <div class="daily-words" id="daily-words">
          <span class="daily-empty"
            >📭 Hali bugun hech qanday so'z yodlanmagan</span
          >
        </div>
      </div>

      <!-- ADD -->
      <div class="add-box">
        <div class="add-head">
          <h3 id="add-title">✏️ Yangi so'z qo'shish</h3>
          <span id="edit-badge" style="display: none" class="edit-badge"
            >✏️ Tahrir</span
          >
        </div>
        <div class="add-grid">
          <input
            type="text"
            id="uz-input"
            placeholder="O'zbekcha so'z..."
            oninput="translateWord()"
          />
          <div class="trans-box" id="trans-result">🇰🇷 Koreyscha tarjimasi</div>
          <input
            type="text"
            id="kor-input"
            placeholder="Koreyscha (tuzatish)"
            style="display: none"
          />
          <select id="cat-select">
            <option value="umumiy">📌 Umumiy</option>
            <option value="ish">💼 Ish</option>
            <option value="o'qish">📚 O'qish</option>
            <option value="sayohat">✈️ Sayohat</option>
            <option value="ovqat">🍜 Ovqat</option>
            <option value="sport">🏃 Sport</option>
            <option value="salomatlik">💊 Salomatlik</option>
            <option value="uy">🏠 Uy</option>
            <option value="texnologiya">💻 Texnologiya</option>
            <option value="san'at">🎨 San'at</option>
          </select>
          <button class="btn btn-trans" onclick="toggleKorInput()">
            ✏️ Tahrir
          </button>
          <button class="btn btn-save" onclick="addWord()">💾 Saqlash</button>
          <button class="btn btn-danger" onclick="clearAddForm()">
            🗑️ Bekor
          </button>
        </div>
      </div>

      <!-- SEARCH -->
      <div class="search-box">
        <input
          type="text"
          id="search-input"
          placeholder="🔍 So'z yoki kategoriya bo'yicha qidirish..."
          oninput="renderTable()"
        />
        <select id="filter-select" onchange="renderTable()">
          <option value="all">📌 Hammasi</option>
          <option value="done">✅ O'rganilgan</option>
          <option value="undone">⏳ O'rganilmagan</option>
        </select>
        <select id="cat-filter" onchange="renderTable()">
          <option value="all">📂 Barcha kategoriyalar</option>
          <option value="umumiy">📌 Umumiy</option>
          <option value="ish">💼 Ish</option>
          <option value="o'qish">📚 O'qish</option>
          <option value="sayohat">✈️ Sayohat</option>
          <option value="ovqat">🍜 Ovqat</option>
          <option value="sport">🏃 Sport</option>
          <option value="salomatlik">💊 Salomatlik</option>
          <option value="uy">🏠 Uy</option>
          <option value="texnologiya">💻 Texnologiya</option>
          <option value="san'at">🎨 San'at</option>
        </select>
      </div>

      <!-- TABLE -->
      <div class="tbl-wrap">
        <div class="tbl-scroll">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>O'zbekcha</th>
                <th>Koreyscha</th>
                <th>Kategoriya</th>
                <th>Holat</th>
                <th>Amallar</th>
              </tr>
            </thead>
            <tbody id="table-body"></tbody>
          </table>
        </div>
        <div class="pagination">
          <span id="page-info">0-0 / 0</span>
          <div>
            <button onclick="prevPage()" id="prev-btn">← Oldingi</button>
            <button onclick="nextPage()" id="next-btn">Keyingi →</button>
          </div>
        </div>
      </div>
    </div>

    <script>
      // ==================== DATA ====================
      let words = JSON.parse(localStorage.getItem("myWords2")) || [];
      let dailyCount = parseInt(localStorage.getItem("dailyCount2")) || 0;
      let dailyDate = localStorage.getItem("dailyDate2") || "";
      let currentPage = 1;
      const PER_PAGE = 12;
      let editId = null;
      let theme = localStorage.getItem("theme2") || "light";

      // ==================== THEME ====================
      function setTheme(t) {
        theme = t;
        document.documentElement.setAttribute("data-theme", t);
        localStorage.setItem("theme2", t);
      }
      function toggleTheme() {
        setTheme(theme === "light" ? "dark" : "light");
      }
      if (theme === "dark")
        document.documentElement.setAttribute("data-theme", "dark");

      // ==================== SAVE ====================
      function saveData() {
        localStorage.setItem("myWords2", JSON.stringify(words));
        localStorage.setItem("dailyCount2", dailyCount);
        localStorage.setItem("dailyDate2", dailyDate);
        updateStats();
        renderTable();
      }

      // ==================== STATS ====================
      function updateStats() {
        const total = words.length;
        const learned = words.filter((w) => w.done).length;
        const remain = total - learned;
        document.getElementById("total-count").textContent = total;
        document.getElementById("learned-count").textContent = learned;
        document.getElementById("remain-count").textContent = remain;

        const today = new Date().toDateString();
        if (dailyDate !== today) {
          dailyCount = 0;
          dailyDate = today;
          saveData();
        }
        document.getElementById("daily-count").textContent = dailyCount;
        document.getElementById("daily-date-label").textContent =
          new Date().toLocaleDateString("uz-UZ", {
            weekday: "short",
            day: "numeric",
            month: "short",
          });
        renderDailyWords();
      }

      // ==================== TRANSLATE ====================
      async function translateWord() {
        const uz = document.getElementById("uz-input").value.trim();
        const transBox = document.getElementById("trans-result");
        const korInput = document.getElementById("kor-input");

        if (!uz) {
          transBox.textContent = "🇰🇷 Koreyscha tarjimasi";
          korInput.value = "";
          transBox.className = "trans-box";
          return;
        }

        transBox.textContent = "⏳ Tarjima...";
        transBox.className = "trans-box loading";

        try {
          const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=uz&tl=ko&dt=t&q=${encodeURIComponent(uz)}`;
          const res = await fetch(url);
          const data = await res.json();
          const translation = data[0][0][0];
          transBox.textContent = translation;
          transBox.className = "trans-box success";
          korInput.value = translation;
        } catch (e) {
          transBox.textContent = "❌ Xatolik, o'zingiz yozing";
          transBox.className = "trans-box error";
          korInput.value = "";
        }
      }

      function toggleKorInput() {
        const korInput = document.getElementById("kor-input");
        const transBox = document.getElementById("trans-result");
        if (korInput.style.display === "none") {
          korInput.style.display = "block";
          korInput.value = transBox.textContent;
          transBox.style.display = "none";
        } else {
          korInput.style.display = "none";
          transBox.style.display = "flex";
          transBox.textContent = korInput.value || "🇰🇷 Koreyscha tarjimasi";
          transBox.className = "trans-box";
        }
      }

      // ==================== ADD WORD ====================
      function addWord() {
        const uz = document.getElementById("uz-input").value.trim();
        const korInput = document.getElementById("kor-input");
        const transBox = document.getElementById("trans-result");
        const cat = document.getElementById("cat-select").value;

        let kor =
          korInput.style.display !== "none"
            ? korInput.value.trim()
            : transBox.textContent.trim();
        const skipWords = [
          "🇰🇷 Koreyscha tarjimasi",
          "⏳ Tarjima...",
          "❌ Xatolik, o'zingiz yozing",
          "",
        ];
        if (skipWords.includes(kor) || kor.includes("tarjimasi")) kor = "";

        if (!uz || !kor) {
          alert("❗ Iltimos, o'zbekcha va koreyscha so'zlarni kiriting!");
          return;
        }

        if (editId !== null) {
          const idx = words.findIndex((w) => w.id === editId);
          if (idx !== -1) {
            words[idx].uz = uz;
            words[idx].kor = kor;
            words[idx].cat = cat;
          }
          editId = null;
          document.getElementById("add-title").textContent =
            "✏️ Yangi so'z qo'shish";
          document.getElementById("edit-badge").style.display = "none";
          document.querySelector(".btn-save").textContent = "💾 Saqlash";
        } else {
          const newId =
            words.length > 0 ? Math.max(...words.map((w) => w.id)) + 1 : 1;
          words.push({ id: newId, uz: uz, kor: kor, done: false, cat: cat });
        }

        clearAddForm();
        saveData();
        renderTable();
      }

      function deleteWord(id) {
        if (!confirm("❗ Bu so'zni o'chirasizmi?")) return;
        words = words.filter((w) => w.id !== id);
        saveData();
        renderTable();
      }

      function editWord(id) {
        const word = words.find((w) => w.id === id);
        if (!word) return;

        editId = id;
        document.getElementById("uz-input").value = word.uz;
        document.getElementById("trans-result").textContent = word.kor;
        document.getElementById("trans-result").style.display = "flex";
        document.getElementById("trans-result").className = "trans-box success";
        document.getElementById("kor-input").value = word.kor;
        document.getElementById("kor-input").style.display = "none";
        document.getElementById("cat-select").value = word.cat || "umumiy";
        document.getElementById("add-title").textContent =
          "✏️ So'zni tahrirlash";
        document.getElementById("edit-badge").style.display = "inline";
        document.querySelector(".btn-save").textContent = "💾 Yangilash";
        document.getElementById("uz-input").focus();
      }

      function clearAddForm() {
        document.getElementById("uz-input").value = "";
        document.getElementById("trans-result").textContent =
          "🇰🇷 Koreyscha tarjimasi";
        document.getElementById("trans-result").style.display = "flex";
        document.getElementById("trans-result").className = "trans-box";
        document.getElementById("kor-input").value = "";
        document.getElementById("kor-input").style.display = "none";
        document.getElementById("cat-select").value = "umumiy";
        document.getElementById("add-title").textContent =
          "✏️ Yangi so'z qo'shish";
        document.getElementById("edit-badge").style.display = "none";
        document.querySelector(".btn-save").textContent = "💾 Saqlash";
        editId = null;
      }

      function toggleDone(id) {
        const word = words.find((w) => w.id === id);
        if (word) {
          word.done = !word.done;
          if (word.done) {
            const today = new Date().toDateString();
            if (dailyDate !== today) {
              dailyCount = 0;
              dailyDate = today;
            }
            dailyCount++;
          }
          saveData();
          renderTable();
        }
      }

      // ==================== DAILY ====================
      function addDaily() {
        const input = document.getElementById("daily-input");
        const count = parseInt(input.value);
        if (!count || count < 1) {
          alert("❗ Iltimos, nechta so'z yodlaganingizni yozing!");
          return;
        }

        const today = new Date().toDateString();
        if (dailyDate !== today) {
          dailyCount = 0;
          dailyDate = today;
        }
        dailyCount += count;
        saveData();
        input.value = "";
        updateStats();
      }

      function clearDaily() {
        if (
          !confirm("❗ Bugungi yodlagan so'zlar statistikasini tozalaysizmi?")
        )
          return;
        dailyCount = 0;
        dailyDate = new Date().toDateString();
        saveData();
      }

      function renderDailyWords() {
        const container = document.getElementById("daily-words");
        if (dailyCount === 0) {
          container.innerHTML =
            '<span class="daily-empty">📭 Hali bugun hech qanday so\'z yodlanmagan</span>';
          return;
        }
        const recent = words
          .filter((w) => w.done)
          .slice(-Math.min(dailyCount, 20));
        if (recent.length === 0) {
          container.innerHTML = `<span class="daily-tag">✅ ${dailyCount} ta so'z yodlagansiz</span>`;
          return;
        }
        container.innerHTML =
          recent
            .map(
              (w) => `<span class="daily-tag done">${w.uz} → ${w.kor}</span>`,
            )
            .join("") +
          (recent.length < dailyCount
            ? `<span class="daily-tag">+${dailyCount - recent.length} ta</span>`
            : "");
      }

      // ==================== TABLE ====================
      function getFiltered() {
        const q = document
          .getElementById("search-input")
          .value.toLowerCase()
          .trim();
        const filter = document.getElementById("filter-select").value;
        const catFilter = document.getElementById("cat-filter").value;

        let list = words.filter((w) => {
          const match =
            !q ||
            w.uz.toLowerCase().includes(q) ||
            w.kor.toLowerCase().includes(q) ||
            (w.cat || "").toLowerCase().includes(q);
          const catMatch = catFilter === "all" || w.cat === catFilter;
          if (filter === "done") return match && catMatch && w.done;
          if (filter === "undone") return match && catMatch && !w.done;
          return match && catMatch;
        });
        return list;
      }

      const CAT_EMOJI = {
        umumiy: "📌",
        ish: "💼",
        "o'qish": "📚",
        sayohat: "✈️",
        ovqat: "🍜",
        sport: "🏃",
        salomatlik: "💊",
        uy: "🏠",
        texnologiya: "💻",
        "san'at": "🎨",
      };

      function renderTable() {
        const list = getFiltered();
        const total = list.length;
        const totalPages = Math.max(1, Math.ceil(total / PER_PAGE));
        if (currentPage > totalPages) currentPage = totalPages;

        const start = (currentPage - 1) * PER_PAGE;
        const slice = list.slice(start, start + PER_PAGE);

        const tbody = document.getElementById("table-body");
        if (!slice.length) {
          tbody.innerHTML = `<tr><td colspan="6" class="empty"><span class="big">📭</span>Hali hech qanday so'z qo'shilmagan<br><span style="font-size:12px;color:var(--text-secondary)">Yuqoridagi formadan so'z qo'shishni boshlang</span></td></tr>`;
        } else {
          tbody.innerHTML = slice
            .map((w, i) => {
              const catEmoji = CAT_EMOJI[w.cat] || "📌";
              const catLabel = w.cat || "umumiy";
              return `
            <tr>
                <td style="font-weight:600;color:var(--text-secondary)">${start + i + 1}</td>
                <td class="word-uz">${w.uz}</td>
                <td class="word-kor">${w.kor}</td>
                <td><span class="cat-badge">${catEmoji} ${catLabel}</span></td>
                <td><span class="status-badge ${w.done ? "status-done" : "status-undone"}">${w.done ? "✅ O'rganilgan" : "⏳ O'rganilmagan"}</span></td>
                <td class="actions">
                    <button class="btn-check ${w.done ? "done" : ""}" onclick="toggleDone(${w.id})" title="${w.done ? "Bekor qilish" : "O'rganildi"}">${w.done ? "↩️" : "✅"}</button>
                    <button class="btn-edit" onclick="editWord(${w.id})" title="Tahrirlash">✏️</button>
                    <button class="btn-danger" onclick="deleteWord(${w.id})" title="O'chirish">🗑️</button>
                </td>
            </tr>
        `;
            })
            .join("");
        }

        document.getElementById("page-info").textContent =
          `${total > 0 ? start + 1 : 0}–${Math.min(start + PER_PAGE, total)} / ${total} ta so'z`;
        document.getElementById("prev-btn").disabled = currentPage <= 1;
        document.getElementById("next-btn").disabled =
          currentPage >= totalPages;
      }

      function prevPage() {
        if (currentPage > 1) {
          currentPage--;
          renderTable();
        }
      }
      function nextPage() {
        const total = getFiltered().length;
        if (currentPage < Math.ceil(total / PER_PAGE)) {
          currentPage++;
          renderTable();
        }
      }

      // ==================== INIT ====================
      updateStats();
      renderTable();

      // Enter bilan qo'shish
      document.getElementById("uz-input").addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          addWord();
        }
      });
      document
        .getElementById("daily-input")
        .addEventListener("keydown", (e) => {
          if (e.key === "Enter") {
            e.preventDefault();
            addDaily();
          }
        });
      document
        .getElementById("search-input")
        .addEventListener("keydown", (e) => {
          if (e.key === "Escape") {
            e.target.value = "";
            renderTable();
          }
        });
    </script>
  </body>
</html>
