<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>단어장 — Shaxsiy Lug'at</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,900&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ============ TOKENS ============ */
      :root {
        --paper: #f6f1e7;
        --paper-deep: #efe7d6;
        --card: #fffdf8;
        --ink: #2b2520;
        --ink-soft: #6b6055;
        --rule: #ded2b8;
        --red: #c1432e;
        --red-soft: #f3ddd6;
        --blue: #3b5ba5;
        --blue-soft: #dde6f4;
        --moss: #5c7a4f;
        --moss-soft: #e1ead9;
        --gold: #c98a2c;
        --gold-soft: #f3e3c2;
        --shadow-card:
          0 2px 0 var(--rule), 0 10px 24px -12px rgba(43, 37, 32, 0.25);
        --radius: 4px;
      }
      [data-theme="dark"] {
        --paper: #1a1611;
        --paper-deep: #15110d;
        --card: #221d17;
        --ink: #ece3d2;
        --ink-soft: #a89c89;
        --rule: #3a3025;
        --red: #e2725a;
        --red-soft: #3a2420;
        --blue: #7fa0e0;
        --blue-soft: #1f2a3d;
        --moss: #8fb380;
        --moss-soft: #202a1c;
        --gold: #e0ad5c;
        --gold-soft: #332b18;
        --shadow-card:
          0 2px 0 var(--rule), 0 10px 24px -12px rgba(0, 0, 0, 0.6);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        -webkit-tap-highlight-color: transparent;
      }
      body {
        font-family: "Space Grotesk", sans-serif;
        background: var(--paper);
        background-image: radial-gradient(
          circle at 1px 1px,
          var(--rule) 1px,
          transparent 0
        );
        background-size: 26px 26px;
        color: var(--ink);
        min-height: 100vh;
        transition:
          background 0.3s,
          color 0.3s;
        padding: 22px 18px 60px;
      }
      .wrap {
        max-width: 1180px;
        margin: 0 auto;
      }
      .serif {
        font-family: "Fraunces", serif;
      }
      .mono {
        font-family: "JetBrains Mono", monospace;
      }

      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--rule);
        border-radius: 10px;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      /* ============ HEADER ============ */
      .masthead {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        flex-wrap: wrap;
        gap: 14px;
        padding-bottom: 18px;
        margin-bottom: 26px;
        border-bottom: 3px solid var(--ink);
      }
      .masthead-title {
        display: flex;
        align-items: baseline;
        gap: 14px;
        flex-wrap: wrap;
      }
      .masthead-title h1 {
        font-family: "Fraunces", serif;
        font-weight: 900;
        font-size: clamp(28px, 5vw, 44px);
        letter-spacing: -0.5px;
        line-height: 1;
      }
      .masthead-title .kr {
        font-family: "Fraunces", serif;
        font-weight: 400;
        font-style: italic;
        font-size: 17px;
        color: var(--ink-soft);
      }
      .masthead-sub {
        font-family: "JetBrains Mono", monospace;
        font-size: 11.5px;
        color: var(--ink-soft);
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .masthead-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .pill-btn {
        font-family: "Space Grotesk", sans-serif;
        font-weight: 600;
        font-size: 13px;
        padding: 9px 16px;
        border: 2px solid var(--ink);
        border-radius: 999px;
        background: transparent;
        color: var(--ink);
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .pill-btn:hover {
        background: var(--ink);
        color: var(--paper);
      }
      .pill-btn:active {
        transform: scale(0.95);
      }

      /* ============ STATS — STAMP ROW ============ */
      .stats {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 14px;
        margin-bottom: 24px;
      }
      .stat {
        background: var(--card);
        border: 1.5px solid var(--rule);
        border-radius: var(--radius);
        padding: 16px 18px;
        box-shadow: var(--shadow-card);
        position: relative;
        animation: rise 0.5s ease-out backwards;
      }
      .stat:nth-child(1) {
        animation-delay: 0.02s;
      }
      .stat:nth-child(2) {
        animation-delay: 0.08s;
      }
      .stat:nth-child(3) {
        animation-delay: 0.14s;
      }
      .stat:nth-child(4) {
        animation-delay: 0.2s;
      }
      .stat .tag {
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--ink-soft);
        display: block;
        margin-bottom: 8px;
      }
      .stat .num {
        font-family: "Fraunces", serif;
        font-weight: 800;
        font-size: 36px;
        line-height: 1;
        letter-spacing: -1px;
      }
      .stat.c-red .num {
        color: var(--red);
      }
      .stat.c-blue .num {
        color: var(--blue);
      }
      .stat.c-moss .num {
        color: var(--moss);
      }
      .stat.c-gold .num {
        color: var(--gold);
      }
      .stat::after {
        content: "";
        position: absolute;
        top: 12px;
        right: 12px;
        width: 7px;
        height: 7px;
        border-radius: 50%;
      }
      .stat.c-red::after {
        background: var(--red);
      }
      .stat.c-blue::after {
        background: var(--blue);
      }
      .stat.c-moss::after {
        background: var(--moss);
      }
      .stat.c-gold::after {
        background: var(--gold);
      }

      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ============ DAILY — TICKET STUB ============ */
      .daily {
        background: var(--card);
        border: 1.5px solid var(--rule);
        border-radius: var(--radius);
        box-shadow: var(--shadow-card);
        margin-bottom: 22px;
        display: grid;
        grid-template-columns: 1fr 1px 1.4fr;
        overflow: hidden;
      }
      .daily-tear {
        background: repeating-linear-gradient(
          to bottom,
          var(--rule) 0 8px,
          transparent 8px 16px
        );
      }
      .daily-left,
      .daily-right {
        padding: 20px 22px;
      }
      .daily-left {
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 4px;
      }
      .daily-left .eyebrow {
        font-family: "JetBrains Mono", monospace;
        font-size: 10.5px;
        text-transform: uppercase;
        letter-spacing: 1.2px;
        color: var(--moss);
      }
      .daily-left .big-date {
        font-family: "Fraunces", serif;
        font-weight: 800;
        font-size: 26px;
      }
      .daily-right {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .daily-row {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }
      .daily-row input[type="number"] {
        width: 84px;
        padding: 9px 12px;
        border: 2px solid var(--rule);
        border-radius: var(--radius);
        font-family: "JetBrains Mono", monospace;
        font-weight: 600;
        font-size: 16px;
        background: var(--paper);
        color: var(--ink);
        outline: none;
        text-align: center;
      }
      .daily-row input:focus {
        border-color: var(--moss);
      }
      .daily-row .info {
        color: var(--ink-soft);
        font-size: 13px;
      }
      .btn {
        font-family: "Space Grotesk", sans-serif;
        padding: 9px 18px;
        border: none;
        border-radius: var(--radius);
        font-weight: 700;
        font-size: 13px;
        cursor: pointer;
        transition:
          transform 0.12s ease,
          filter 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        white-space: nowrap;
      }
      .btn:active {
        transform: scale(0.95);
      }
      .btn-ink {
        background: var(--ink);
        color: var(--paper);
      }
      .btn-ink:hover {
        filter: brightness(1.3);
      }
      .btn-outline {
        background: transparent;
        border: 2px solid var(--rule);
        color: var(--ink);
      }
      .btn-outline:hover {
        border-color: var(--ink);
      }
      .btn-red {
        background: var(--red);
        color: #fff;
      }
      .btn-red:hover {
        filter: brightness(1.1);
      }
      .btn-gold {
        background: var(--gold);
        color: #2b2113;
      }
      .btn-gold:hover {
        filter: brightness(1.1);
      }
      .btn-sm {
        padding: 6px 14px;
        font-size: 12px;
      }

      .daily-words {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        min-height: 28px;
      }
      .daily-tag {
        font-family: "JetBrains Mono", monospace;
        font-size: 11.5px;
        background: var(--moss-soft);
        color: var(--moss);
        padding: 5px 12px;
        border-radius: 999px;
        border: 1px solid var(--moss);
      }
      .daily-empty {
        color: var(--ink-soft);
        font-size: 13px;
        font-style: italic;
      }

      /* ============ ADD CARD — INDEX CARD ============ */
      .add-card {
        background: var(--card);
        border: 1.5px solid var(--rule);
        border-radius: var(--radius);
        box-shadow: var(--shadow-card);
        margin-bottom: 22px;
        padding: 22px 24px;
        position: relative;
        border-top: 3px solid var(--ink);
      }
      .add-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
        flex-wrap: wrap;
        gap: 8px;
      }
      .add-head h3 {
        font-family: "Fraunces", serif;
        font-weight: 700;
        font-size: 19px;
      }
      .edit-badge {
        background: var(--gold);
        color: #2b2113;
        padding: 3px 12px;
        border-radius: 999px;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        font-family: "JetBrains Mono", monospace;
      }
      .add-grid {
        display: grid;
        grid-template-columns: 1.2fr 1.2fr 0.9fr auto auto auto;
        gap: 10px;
        align-items: stretch;
      }
      .field-label {
        font-family: "JetBrains Mono", monospace;
        font-size: 9.5px;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        color: var(--ink-soft);
        display: block;
        margin-bottom: 5px;
      }
      .add-grid input,
      .add-grid select {
        width: 100%;
        padding: 11px 14px;
        border: 2px solid var(--rule);
        border-radius: var(--radius);
        font-size: 14.5px;
        font-family: "Space Grotesk", sans-serif;
        background: var(--paper);
        color: var(--ink);
        outline: none;
        transition: border-color 0.15s ease;
      }
      .add-grid input:focus,
      .add-grid select:focus {
        border-color: var(--blue);
      }
      .trans-box {
        width: 100%;
        padding: 11px 14px;
        background: var(--blue-soft);
        border-radius: var(--radius);
        font-size: 14.5px;
        color: var(--blue);
        border: 2px dashed var(--blue);
        min-height: 44px;
        display: flex;
        align-items: center;
        font-weight: 600;
        font-family: "Fraunces", serif;
      }
      .trans-box.loading {
        color: var(--ink-soft);
        font-style: italic;
        border-color: var(--rule);
        background: var(--paper);
        font-family: inherit;
        font-weight: 400;
      }
      .trans-box.error {
        color: var(--red);
        border-color: var(--red);
        background: var(--red-soft);
        font-family: inherit;
        font-weight: 400;
        font-size: 13px;
      }
      .trans-box.empty-state {
        color: var(--ink-soft);
        border-color: var(--rule);
        background: var(--paper);
        font-family: inherit;
        font-weight: 400;
      }

      /* ============ SEARCH BAR ============ */
      .search-box {
        display: grid;
        grid-template-columns: 2fr 1fr 1fr;
        gap: 10px;
        margin-bottom: 16px;
      }
      .search-box input,
      .search-box select {
        padding: 11px 14px;
        border: 2px solid var(--rule);
        border-radius: var(--radius);
        font-size: 13.5px;
        font-family: "Space Grotesk", sans-serif;
        background: var(--card);
        color: var(--ink);
        outline: none;
        transition: border-color 0.15s ease;
      }
      .search-box input:focus,
      .search-box select:focus {
        border-color: var(--ink);
      }

      /* ============ CARD GRID (flashcards) ============ */
      .card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
        gap: 14px;
        margin-bottom: 18px;
      }
      .flash {
        background: var(--card);
        border: 1.5px solid var(--rule);
        border-radius: var(--radius);
        box-shadow: var(--shadow-card);
        padding: 16px 18px;
        position: relative;
        cursor: default;
        animation: rise 0.35s ease-out backwards;
        display: flex;
        flex-direction: column;
        gap: 10px;
        transition: border-color 0.15s ease;
      }
      .flash.is-done {
        border-color: var(--moss);
      }
      .flash-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 6px;
      }
      .flash-idx {
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
        color: var(--ink-soft);
      }
      .flash-cat {
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
        padding: 2px 9px;
        border-radius: 999px;
        background: var(--paper-deep);
        color: var(--ink-soft);
        border: 1px solid var(--rule);
        white-space: nowrap;
      }
      .flash-uz {
        font-family: "Fraunces", serif;
        font-weight: 700;
        font-size: 19px;
        color: var(--ink);
        line-height: 1.2;
      }
      .flash-divider {
        border: none;
        border-top: 1.5px dashed var(--rule);
        margin: 0;
      }
      .flash-kor {
        font-family: "Space Grotesk", sans-serif;
        font-weight: 500;
        font-size: 16px;
        color: var(--blue);
      }
      .flash-actions {
        display: flex;
        gap: 6px;
        margin-top: 2px;
      }
      .icon-btn {
        flex: 1;
        padding: 7px 0;
        border: none;
        border-radius: var(--radius);
        font-size: 13px;
        cursor: pointer;
        font-weight: 600;
        transition:
          transform 0.1s ease,
          filter 0.15s ease;
        font-family: "Space Grotesk", sans-serif;
      }
      .icon-btn:active {
        transform: scale(0.92);
      }
      .ib-check {
        background: var(--moss-soft);
        color: var(--moss);
      }
      .ib-check.done {
        background: var(--paper-deep);
        color: var(--ink-soft);
      }
      .ib-edit {
        background: var(--gold-soft);
        color: var(--gold);
      }
      .ib-del {
        background: var(--red-soft);
        color: var(--red);
      }
      .icon-btn:hover {
        filter: brightness(0.95);
      }

      .empty-state-block {
        text-align: center;
        padding: 70px 20px;
        color: var(--ink-soft);
        grid-column: 1 / -1;
      }
      .empty-state-block .big {
        font-size: 52px;
        display: block;
        margin-bottom: 14px;
      }
      .empty-state-block .lead {
        font-family: "Fraunces", serif;
        font-weight: 600;
        font-size: 17px;
        color: var(--ink);
        margin-bottom: 6px;
      }

      /* ============ PAGINATION ============ */
      .pagination {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 14px 4px;
        font-size: 13px;
        color: var(--ink-soft);
        flex-wrap: wrap;
        gap: 10px;
        font-family: "JetBrains Mono", monospace;
      }
      .pagination .nav-btns {
        display: flex;
        gap: 8px;
      }
      .pagination button {
        padding: 8px 18px;
        border: 2px solid var(--rule);
        border-radius: var(--radius);
        background: var(--card);
        color: var(--ink);
        cursor: pointer;
        font-size: 12px;
        font-weight: 600;
        font-family: "Space Grotesk", sans-serif;
        transition: all 0.15s ease;
      }
      .pagination button:hover:not(:disabled) {
        border-color: var(--ink);
      }
      .pagination button:disabled {
        opacity: 0.35;
        cursor: not-allowed;
      }

      /* ============ RESPONSIVE ============ */
      @media (max-width: 980px) {
        .add-grid {
          grid-template-columns: 1fr 1fr;
        }
        .add-grid .btn {
          width: 100%;
          justify-content: center;
        }
      }
      @media (max-width: 760px) {
        .stats {
          grid-template-columns: repeat(2, 1fr);
        }
        .daily {
          grid-template-columns: 1fr;
        }
        .daily-tear {
          display: none;
        }
        .search-box {
          grid-template-columns: 1fr;
        }
        .add-grid {
          grid-template-columns: 1fr;
        }
      }
      @media (max-width: 480px) {
        body {
          padding: 14px 10px 50px;
        }
        .masthead-title h1 {
          font-size: 26px;
        }
        .stat .num {
          font-size: 28px;
        }
        .card-grid {
          grid-template-columns: 1fr 1fr;
          gap: 10px;
        }
        .flash {
          padding: 12px 13px;
        }
        .flash-uz {
          font-size: 16px;
        }
        .flash-kor {
          font-size: 14px;
        }
      }
      @media (max-width: 360px) {
        .card-grid {
          grid-template-columns: 1fr;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        * {
          animation: none !important;
          transition: none !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <!-- MASTHEAD -->
      <div class="masthead">
        <div>
          <div class="masthead-title">
            <h1>단어장</h1>
            <span class="kr">— Shaxsiy Lug'at</span>
          </div>
          <div class="masthead-sub">
            vol. 01 · uzbek → korean vocabulary log
          </div>
        </div>
        <div class="masthead-actions">
          <button class="pill-btn" onclick="toggleTheme()" id="theme-toggle">
            🌓 Rejim
          </button>
          <a href="./index.html"><button class="pill-btn">🏠 Home</button></a>
        </div>
      </div>

      <!-- STATS -->
      <div class="stats">
        <div class="stat c-red">
          <span class="tag">jami so'z</span>
          <div class="num" id="total-count">0</div>
        </div>
        <div class="stat c-blue">
          <span class="tag">o'rganilgan</span>
          <div class="num" id="learned-count">0</div>
        </div>
        <div class="stat c-gold">
          <span class="tag">qolgan</span>
          <div class="num" id="remain-count">0</div>
        </div>
        <div class="stat c-moss">
          <span class="tag">bugun yodlangan</span>
          <div class="num" id="daily-count">0</div>
        </div>
      </div>

      <!-- DAILY TICKET -->
      <div class="daily">
        <div class="daily-left">
          <span class="eyebrow">kunlik chipta</span>
          <span class="big-date serif" id="daily-date-label">Bugun</span>
          <span class="masthead-sub" style="margin-top: 4px"
            >№ <span id="daily-count-2">0</span> so'z saqlandi</span
          >
        </div>
        <div class="daily-tear"></div>
        <div class="daily-right">
          <div class="daily-row">
            <input
              type="number"
              id="daily-input"
              min="1"
              max="200"
              placeholder="70"
            />
            <span class="info">ta so'z yodladim</span>
            <button class="btn btn-ink" onclick="addDaily()">
              ➕ Kiritish
            </button>
            <button class="btn btn-outline btn-sm" onclick="clearDaily()">
              🗑️ Tozalash
            </button>
          </div>
          <div class="daily-words" id="daily-words">
            <span class="daily-empty"
              >📭 Hali bugun hech qanday so'z yodlanmagan</span
            >
          </div>
        </div>
      </div>

      <!-- ADD CARD -->
      <div class="add-card">
        <div class="add-head">
          <h3 id="add-title">✏️ Yangi so'z qo'shish</h3>
          <span id="edit-badge" style="display: none" class="edit-badge"
            >tahrirlanmoqda</span
          >
        </div>
        <div class="add-grid">
          <div>
            <label class="field-label">o'zbekcha</label>
            <input
              type="text"
              id="uz-input"
              placeholder="masalan: kitob"
              oninput="translateWord()"
            />
          </div>
          <div>
            <label class="field-label">koreyscha</label>
            <div class="trans-box empty-state" id="trans-result">
              자동 번역 / avtomatik
            </div>
            <input
              type="text"
              id="kor-input"
              placeholder="Koreyscha (tuzatish)"
              style="display: none"
            />
          </div>
          <div>
            <label class="field-label">kategoriya</label>
            <select id="cat-select">
              <option value="umumiy">📌 Umumiy</option>
              <option value="ish">💼 Ish</option>
              <option value="o'qish">📚 O'qish</option>
              <option value="sayohat">✈️ Sayohat</option>
              <option value="ovqat">🍜 Ovqat</option>
              <option value="sport">🏃 Sport</option>
              <option value="salomatlik">💊 Salomatlik</option>
              <option value="uy">🏠 Uy</option>
              <option value="texnologiya">💻 Texnologiya</option>
              <option value="san'at">🎨 San'at</option>
            </select>
          </div>
          <div style="align-self: end">
            <button class="btn btn-outline" onclick="toggleKorInput()">
              ✏️ Tahrir
            </button>
          </div>
          <div style="align-self: end">
            <button class="btn btn-ink" onclick="addWord()">💾 Saqlash</button>
          </div>
          <div style="align-self: end">
            <button class="btn btn-red" onclick="clearAddForm()">
              ✕ Bekor
            </button>
          </div>
        </div>
      </div>

      <!-- SEARCH -->
      <div class="search-box">
        <input
          type="text"
          id="search-input"
          placeholder="🔍 So'z yoki kategoriya bo'yicha qidirish..."
          oninput="renderTable()"
        />
        <select id="filter-select" onchange="renderTable()">
          <option value="all">📌 Hammasi</option>
          <option value="done">✅ O'rganilgan</option>
          <option value="undone">⏳ O'rganilmagan</option>
        </select>
        <select id="cat-filter" onchange="renderTable()">
          <option value="all">📂 Barcha kategoriyalar</option>
          <option value="umumiy">📌 Umumiy</option>
          <option value="ish">💼 Ish</option>
          <option value="o'qish">📚 O'qish</option>
          <option value="sayohat">✈️ Sayohat</option>
          <option value="ovqat">🍜 Ovqat</option>
          <option value="sport">🏃 Sport</option>
          <option value="salomatlik">💊 Salomatlik</option>
          <option value="uy">🏠 Uy</option>
          <option value="texnologiya">💻 Texnologiya</option>
          <option value="san'at">🎨 San'at</option>
        </select>
      </div>

      <!-- CARD GRID -->
      <div class="card-grid" id="table-body"></div>

      <div class="pagination">
        <span id="page-info" class="mono">0-0 / 0</span>
        <div class="nav-btns">
          <button onclick="prevPage()" id="prev-btn">← Oldingi</button>
          <button onclick="nextPage()" id="next-btn">Keyingi →</button>
        </div>
      </div>
    </div>

    <script>
      // ==================== DATA ====================
      let words = JSON.parse(localStorage.getItem("myWords2")) || [];
      let dailyCount = parseInt(localStorage.getItem("dailyCount2")) || 0;
      let dailyDate = localStorage.getItem("dailyDate2") || "";
      let currentPage = 1;
      const PER_PAGE = 12;
      let editId = null;
      let theme = localStorage.getItem("theme2") || "light";

      // ==================== THEME ====================
      function setTheme(t) {
        theme = t;
        document.documentElement.setAttribute("data-theme", t);
        localStorage.setItem("theme2", t);
      }
      function toggleTheme() {
        setTheme(theme === "light" ? "dark" : "light");
      }
      if (theme === "dark")
        document.documentElement.setAttribute("data-theme", "dark");

      // ==================== SAVE ====================
      function saveData() {
        localStorage.setItem("myWords2", JSON.stringify(words));
        localStorage.setItem("dailyCount2", dailyCount);
        localStorage.setItem("dailyDate2", dailyDate);
        updateStats();
        renderTable();
      }

      // ==================== STATS ====================
      function updateStats() {
        const total = words.length;
        const learned = words.filter((w) => w.done).length;
        const remain = total - learned;
        document.getElementById("total-count").textContent = total;
        document.getElementById("learned-count").textContent = learned;
        document.getElementById("remain-count").textContent = remain;

        const today = new Date().toDateString();
        if (dailyDate !== today) {
          dailyCount = 0;
          dailyDate = today;
          saveData();
          return;
        }
        document.getElementById("daily-count").textContent = dailyCount;
        document.getElementById("daily-count-2").textContent = dailyCount;
        document.getElementById("daily-date-label").textContent =
          new Date().toLocaleDateString("uz-UZ", {
            weekday: "short",
            day: "numeric",
            month: "short",
          });
        renderDailyWords();
      }

      // ==================== TRANSLATE ====================
      let translateTimer = null;
      async function translateWord() {
        const uz = document.getElementById("uz-input").value.trim();
        const transBox = document.getElementById("trans-result");
        const korInput = document.getElementById("kor-input");

        clearTimeout(translateTimer);

        if (!uz) {
          transBox.textContent = "자동 번역 / avtomatik";
          korInput.value = "";
          transBox.className = "trans-box empty-state";
          return;
        }

        transBox.textContent = "⏳ Tarjima qilinmoqda...";
        transBox.className = "trans-box loading";

        translateTimer = setTimeout(async () => {
          try {
            const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=uz&tl=ko&dt=t&q=${encodeURIComponent(uz)}`;
            const res = await fetch(url);
            const data = await res.json();
            const translation = data[0][0][0];
            transBox.textContent = translation;
            transBox.className = "trans-box";
            korInput.value = translation;
          } catch (e) {
            transBox.textContent =
              "❌ Xatolik — pastdagi ✏️ Tahrir tugmasi bilan o'zingiz yozing";
            transBox.className = "trans-box error";
            korInput.value = "";
          }
        }, 380);
      }

      function toggleKorInput() {
        const korInput = document.getElementById("kor-input");
        const transBox = document.getElementById("trans-result");
        if (korInput.style.display === "none") {
          korInput.style.display = "block";
          korInput.value =
            transBox.classList.contains("empty-state") ||
            transBox.classList.contains("error")
              ? ""
              : transBox.textContent;
          transBox.style.display = "none";
        } else {
          korInput.style.display = "none";
          transBox.style.display = "flex";
          if (korInput.value.trim()) {
            transBox.textContent = korInput.value;
            transBox.className = "trans-box";
          } else {
            transBox.textContent = "자동 번역 / avtomatik";
            transBox.className = "trans-box empty-state";
          }
        }
      }

      // ==================== ADD WORD ====================
      function addWord() {
        const uz = document.getElementById("uz-input").value.trim();
        const korInput = document.getElementById("kor-input");
        const transBox = document.getElementById("trans-result");
        const cat = document.getElementById("cat-select").value;

        let kor =
          korInput.style.display !== "none"
            ? korInput.value.trim()
            : transBox.textContent.trim();
        const skipWords = [
          "자동 번역 / avtomatik",
          "⏳ Tarjima qilinmoqda...",
          "",
        ];
        if (skipWords.includes(kor) || kor.includes("Xatolik")) kor = "";

        if (!uz || !kor) {
          alert("❗ Iltimos, o'zbekcha va koreyscha so'zlarni kiriting!");
          return;
        }

        if (editId !== null) {
          const idx = words.findIndex((w) => w.id === editId);
          if (idx !== -1) {
            words[idx].uz = uz;
            words[idx].kor = kor;
            words[idx].cat = cat;
          }
          editId = null;
          document.getElementById("add-title").textContent =
            "✏️ Yangi so'z qo'shish";
          document.getElementById("edit-badge").style.display = "none";
        } else {
          const newId =
            words.length > 0 ? Math.max(...words.map((w) => w.id)) + 1 : 1;
          words.push({ id: newId, uz: uz, kor: kor, done: false, cat: cat });
        }

        clearAddForm();
        saveData();
        renderTable();
      }

      function deleteWord(id) {
        if (!confirm("❗ Bu so'zni o'chirasizmi?")) return;
        words = words.filter((w) => w.id !== id);
        saveData();
        renderTable();
      }

      function editWord(id) {
        const word = words.find((w) => w.id === id);
        if (!word) return;

        editId = id;
        document.getElementById("uz-input").value = word.uz;
        const transBox = document.getElementById("trans-result");
        transBox.textContent = word.kor;
        transBox.style.display = "flex";
        transBox.className = "trans-box";
        document.getElementById("kor-input").value = word.kor;
        document.getElementById("kor-input").style.display = "none";
        document.getElementById("cat-select").value = word.cat || "umumiy";
        document.getElementById("add-title").textContent =
          "✏️ So'zni tahrirlash";
        document.getElementById("edit-badge").style.display = "inline";
        document.getElementById("uz-input").focus();
        document
          .querySelector(".add-card")
          .scrollIntoView({ behavior: "smooth", block: "center" });
      }

      function clearAddForm() {
        document.getElementById("uz-input").value = "";
        const transBox = document.getElementById("trans-result");
        transBox.textContent = "자동 번역 / avtomatik";
        transBox.style.display = "flex";
        transBox.className = "trans-box empty-state";
        document.getElementById("kor-input").value = "";
        document.getElementById("kor-input").style.display = "none";
        document.getElementById("cat-select").value = "umumiy";
        document.getElementById("add-title").textContent =
          "✏️ Yangi so'z qo'shish";
        document.getElementById("edit-badge").style.display = "none";
        editId = null;
      }

      function toggleDone(id) {
        const word = words.find((w) => w.id === id);
        if (word) {
          word.done = !word.done;
          if (word.done) {
            const today = new Date().toDateString();
            if (dailyDate !== today) {
              dailyCount = 0;
              dailyDate = today;
            }
            dailyCount++;
          }
          saveData();
          renderTable();
        }
      }

      // ==================== DAILY ====================
      function addDaily() {
        const input = document.getElementById("daily-input");
        const count = parseInt(input.value);
        if (!count || count < 1) {
          alert("❗ Iltimos, nechta so'z yodlaganingizni yozing!");
          return;
        }

        const today = new Date().toDateString();
        if (dailyDate !== today) {
          dailyCount = 0;
          dailyDate = today;
        }
        dailyCount += count;
        saveData();
        input.value = "";
        updateStats();
      }

      function clearDaily() {
        if (
          !confirm("❗ Bugungi yodlagan so'zlar statistikasini tozalaysizmi?")
        )
          return;
        dailyCount = 0;
        dailyDate = new Date().toDateString();
        saveData();
      }

      function renderDailyWords() {
        const container = document.getElementById("daily-words");
        if (dailyCount === 0) {
          container.innerHTML =
            '<span class="daily-empty">📭 Hali bugun hech qanday so\'z yodlanmagan</span>';
          return;
        }
        const recent = words
          .filter((w) => w.done)
          .slice(-Math.min(dailyCount, 20));
        if (recent.length === 0) {
          container.innerHTML = `<span class="daily-tag">✅ ${dailyCount} ta so'z yodlagansiz</span>`;
          return;
        }
        container.innerHTML =
          recent
            .map((w) => `<span class="daily-tag">${w.uz} → ${w.kor}</span>`)
            .join("") +
          (recent.length < dailyCount
            ? `<span class="daily-tag">+${dailyCount - recent.length} ta</span>`
            : "");
      }

      // ==================== TABLE (now CARD GRID) ====================
      function getFiltered() {
        const q = document
          .getElementById("search-input")
          .value.toLowerCase()
          .trim();
        const filter = document.getElementById("filter-select").value;
        const catFilter = document.getElementById("cat-filter").value;

        return words.filter((w) => {
          const match =
            !q ||
            w.uz.toLowerCase().includes(q) ||
            w.kor.toLowerCase().includes(q) ||
            (w.cat || "").toLowerCase().includes(q);
          const catMatch = catFilter === "all" || w.cat === catFilter;
          if (filter === "done") return match && catMatch && w.done;
          if (filter === "undone") return match && catMatch && !w.done;
          return match && catMatch;
        });
      }

      const CAT_EMOJI = {
        umumiy: "📌",
        ish: "💼",
        "o'qish": "📚",
        sayohat: "✈️",
        ovqat: "🍜",
        sport: "🏃",
        salomatlik: "💊",
        uy: "🏠",
        texnologiya: "💻",
        "san'at": "🎨",
      };

      function renderTable() {
        const list = getFiltered();
        const total = list.length;
        const totalPages = Math.max(1, Math.ceil(total / PER_PAGE));
        if (currentPage > totalPages) currentPage = totalPages;

        const start = (currentPage - 1) * PER_PAGE;
        const slice = list.slice(start, start + PER_PAGE);

        const grid = document.getElementById("table-body");
        if (!slice.length) {
          grid.innerHTML = `
            <div class="empty-state-block">
              <span class="big">📭</span>
              <div class="lead">Hali hech qanday so'z qo'shilmagan</div>
              <span class="masthead-sub">Yuqoridagi formadan birinchi so'zingizni qo'shing</span>
            </div>`;
        } else {
          grid.innerHTML = slice
            .map((w, i) => {
              const catEmoji = CAT_EMOJI[w.cat] || "📌";
              const catLabel = w.cat || "umumiy";
              return `
            <div class="flash ${w.done ? "is-done" : ""}" style="animation-delay:${Math.min(i * 0.03, 0.3)}s">
                <div class="flash-top">
                    <span class="flash-idx">#${String(start + i + 1).padStart(3, "0")}</span>
                    <span class="flash-cat">${catEmoji} ${catLabel}</span>
                </div>
                <div class="flash-uz">${w.uz}</div>
                <hr class="flash-divider" />
                <div class="flash-kor">${w.kor}</div>
                <div class="flash-actions">
                    <button class="icon-btn ib-check ${w.done ? "done" : ""}" onclick="toggleDone(${w.id})" title="${w.done ? "Bekor qilish" : "O'rganildi"}">${w.done ? "↩️" : "✅"}</button>
                    <button class="icon-btn ib-edit" onclick="editWord(${w.id})" title="Tahrirlash">✏️</button>
                    <button class="icon-btn ib-del" onclick="deleteWord(${w.id})" title="O'chirish">🗑️</button>
                </div>
            </div>`;
            })
            .join("");
        }

        document.getElementById("page-info").textContent =
          `${total > 0 ? start + 1 : 0}–${Math.min(start + PER_PAGE, total)} / ${total} ta so'z`;
        document.getElementById("prev-btn").disabled = currentPage <= 1;
        document.getElementById("next-btn").disabled =
          currentPage >= totalPages;
      }

      function prevPage() {
        if (currentPage > 1) {
          currentPage--;
          renderTable();
        }
      }
      function nextPage() {
        const total = getFiltered().length;
        if (currentPage < Math.ceil(total / PER_PAGE)) {
          currentPage++;
          renderTable();
        }
      }

      // ==================== INIT ====================
      updateStats();
      renderTable();

      document.getElementById("uz-input").addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          addWord();
        }
      });
      document
        .getElementById("daily-input")
        .addEventListener("keydown", (e) => {
          if (e.key === "Enter") {
            e.preventDefault();
            addDaily();
          }
        });
      document
        .getElementById("search-input")
        .addEventListener("keydown", (e) => {
          if (e.key === "Escape") {
            e.target.value = "";
            renderTable();
          }
        });
    </script>
  </body>
</html>
